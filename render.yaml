services:
  # Backend Web Service (Free Plan)
  - type: web
    name: todox-backend
    env: node
    plan: free # Explicitly using free plan
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # User must provide this in Render Dashboard
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: static_site
    name: todox-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: todox-backend
          property: host
